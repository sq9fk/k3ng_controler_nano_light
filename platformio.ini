; PlatformIO configuration for the RemoteQTH v3.3 / Arduino Nano build of K3NG.
; The sketch lives in k3ng_rotator_controller/ (kept as an .ino so it still
; opens directly in the Arduino IDE); this file just points PlatformIO at it.

[platformio]
src_dir = k3ng_rotator_controller

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328       ; old bootloader, 30720 bytes flash - matches this board
framework = arduino
monitor_speed = 9600        ; must match CONTROL_PORT_BAUD_RATE in rotator_settings.h
lib_deps =
    arduino-libraries/LiquidCrystal@^1.0.7

; NOTE: libraries/ (vendored, Arduino-IDE style) is intentionally NOT added via
; lib_extra_dirs. PlatformIO's dependency finder does a textual #include scan
; that ignores #ifdef guards, so pointing it at that whole folder pulls in
; every optional library (GPS, RTC, compass, Mega-only TimerFive/TimerOne for
; FEATURE_STEPPER_MOTOR, etc.) and fails to compile things this board doesn't
; use. If you enable a feature that needs one of those vendored libraries,
; add just that one subfolder via lib_extra_dirs instead of the whole tree.
